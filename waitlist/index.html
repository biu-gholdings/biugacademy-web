<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIU.G Academy | Waitlist</title>
  <meta name="description" content="Join BIU.G Academy early access.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-nav">
    <div class="inner">
      <a href="/" class="brand">
        <img src="/assets/biug-academy-logo.png" width="38" height="38" alt="">
        <span class="brand-text">BIU.G <span>Academy</span></span>
      </a>
      <nav>
        <a href="/">Home</a>
        <a href="/how">How it works</a>
        <a href="/about">About</a>
        <a href="/waitlist" class="nav-cta">Get Early Access</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="waitlist">
      <h1>Get early access</h1>
      <p>
        Join the first group and get access to initial lessons
        focused on practical skills you can use immediately.
      </p>

      <form action="https://formsubmit.co/support@biugacademy.org" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="contact" placeholder="Phone or Email" required>
        <select name="interest" required>
          <option value="">What do you want to learn?</option>
          <option>Managing money</option>
          <option>Starting a business</option>
          <option>Digital skills</option>
        </select>
        <button type="submit">Get Early Access</button>
      </form>

      <p class="note">
        We will contact you when your first lessons are available.
      </p>
    </section>
  </main>

  <script src="/js/script.js"></script>
</body>
</html>
